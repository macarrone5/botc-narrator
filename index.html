<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Blood on the Clocktower - Asistente</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0a2e">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a0a2e;
            color: #f0e6ff;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .landing {
            text-align: center;
            padding: 24px;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #c39bd3, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #b8a0d4;
            font-size: 0.9rem;
            margin-bottom: 40px;
        }

        .menu-card {
            display: block;
            text-decoration: none;
            background: #3d2a5c;
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 2px solid transparent;
            transition: all 0.2s;
            text-align: left;
        }

        .menu-card:active {
            transform: scale(0.97);
        }

        .menu-card.narrator {
            border-color: #9b59b6;
        }

        .menu-card.players {
            border-color: #3498db;
        }

        .menu-card .card-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .menu-card h2 {
            font-size: 1.1rem;
            color: #f0e6ff;
            margin-bottom: 4px;
        }

        .menu-card p {
            font-size: 0.8rem;
            color: #b8a0d4;
            line-height: 1.4;
        }

        .menu-card .arrow {
            float: right;
            font-size: 1.2rem;
            margin-top: -30px;
            color: #9b59b6;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #666;
        }

        .footer a {
            color: #9b59b6;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="landing">
        <div class="logo">🩸🕐</div>
        <h1>Blood on the Clocktower</h1>
        <p class="subtitle">Asistente de partida</p>

        <a href="narrator.html" class="menu-card narrator">
            <div class="card-icon">🎭</div>
            <h2>Soy el Narrador</h2>
            <p>Crear partida, gestionar noches y días, asignar roles, votar y ver resumen.</p>
            <span class="arrow">→</span>
        </a>

        <a href="roles-guide.html" class="menu-card players">
            <div class="card-icon">📖</div>
            <h2>Soy Jugador</h2>
            <p>Consultar todos los roles, sus habilidades y cómo funcionan. No necesitas ser narrador.</p>
            <span class="arrow">→</span>
        </a>

        <p class="footer">
            Hecho por <a href="https://github.com/macarrone5">macarrone5</a>
        </p>
    </div>
</body>
</html>
